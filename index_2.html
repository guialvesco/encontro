<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Convite Especial 🌹</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;1,400&family=Lato:wght@300;400&display=swap" rel="stylesheet">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    background: #fdf0f4;
    font-family: 'Lato', Arial, sans-serif;
    overflow: hidden;
    position: relative;
  }

  .card {
    background: #fff;
    border-radius: 24px;
    padding: 48px 36px 40px;
    max-width: 400px;
    width: 90%;
    text-align: center;
    border: 0.5px solid #f0c0d0;
    position: relative;
    z-index: 2;
  }

  .conv-icon {
    font-size: 38px;
    margin-bottom: 12px;
    display: block;
    animation: pulse 2s ease-in-out infinite;
  }

  @keyframes pulse {
    0%, 100% { transform: scale(1); }
    50%       { transform: scale(1.15); }
  }

  .conv-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 26px;
    font-weight: 600;
    color: #c0335a;
    margin-bottom: 8px;
    line-height: 1.3;
  }

  .conv-subtitle {
    font-size: 13px;
    color: #999;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    margin-bottom: 24px;
  }

  .divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, #e8a0b8, transparent);
    margin: 0 auto 24px;
  }

  .conv-desc {
    font-size: 15px;
    color: #777;
    line-height: 1.7;
    margin-bottom: 28px;
  }

  .btn-row {
    display: flex;
    gap: 12px;
    justify-content: center;
  }

  .btn-yes {
    font-size: 15px;
    background: #c0335a;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 13px 32px;
    cursor: pointer;
    transition: background 0.2s, transform 0.15s;
    letter-spacing: 0.03em;
  }

  .btn-yes:hover { background: #a02548; transform: scale(1.04); }

  .btn-no {
    font-size: 15px;
    background: transparent;
    color: #bbb;
    border: 0.5px solid #ddd;
    border-radius: 50px;
    padding: 13px 28px;
    cursor: pointer;
    transition: color 0.2s;
    position: static;
  }

  .step-title {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 22px;
    font-style: italic;
    color: #c0335a;
    margin-bottom: 6px;
  }

  .step-text {
    font-size: 14px;
    color: #888;
    margin-bottom: 22px;
  }

  .conv-input {
    width: 100%;
    font-size: 15px;
    color: #333;
    background: #fdf5f8;
    border: 0.5px solid #e8b8cc;
    border-radius: 12px;
    padding: 13px 16px;
    outline: none;
    margin-bottom: 14px;
    transition: border-color 0.2s;
    font-family: 'Lato', Arial, sans-serif;
  }

  .conv-input:focus { border-color: #c0335a; }

  .btn-send {
    font-size: 15px;
    background: #c0335a;
    color: #fff;
    border: none;
    border-radius: 50px;
    padding: 13px 36px;
    cursor: pointer;
    transition: background 0.2s;
    width: 100%;
    font-family: 'Lato', Arial, sans-serif;
  }

  .btn-send:hover { background: #a02548; }

  .final-msg {
    font-family: 'Playfair Display', Georgia, serif;
    font-size: 17px;
    color: #c0335a;
    margin-top: 22px;
    line-height: 1.7;
    animation: fadeUp 0.5s ease;
  }

  .final-msg .small {
    font-size: 14px;
    color: #bbb;
    font-family: 'Lato', Arial, sans-serif;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .petal {
    position: fixed;
    pointer-events: none;
    animation: fall linear forwards;
    z-index: 1;
  }

  @keyframes fall {
    0%   { transform: translateY(-30px) rotate(0deg);   opacity: 1; }
    100% { transform: translateY(110vh) rotate(360deg); opacity: 0; }
  }

  .hidden { display: none; }
</style>
</head>
<body>

<div class="card">

  <!-- PASSO 1: Pergunta -->
  <div id="step1">
    <span class="conv-icon">🌹</span>
    <h1 class="conv-title">Você aceita sair comigo?</h1>
    <p class="conv-subtitle">um convite especial</p>
    <div class="divider"></div>
    <p class="conv-desc">Quero muito a sua companhia.<br>O que você acha?</p>
    <div class="btn-row">
      <button class="btn-yes" onclick="goStep2()">Sim, com certeza</button>
      <button class="btn-no" id="noBtn" onmouseover="escapeBtn(this)">Não sei...</button>
    </div>
  </div>

  <!-- PASSO 2: Lugar -->
  <div id="step2" class="hidden">
    <span class="conv-icon" style="animation:none">✨</span>
    <h2 class="step-title">Que maravilha!</h2>
    <p class="step-text">Para onde você gostaria de ir?</p>
    <div class="divider"></div>
    <input class="conv-input" id="placeInput" type="text" placeholder="Um lugar especial..." />
    <button class="btn-send" onclick="goStep3()">Próximo 🌸</button>
  </div>

  <!-- PASSO 3: Data -->
  <div id="step3" class="hidden">
    <span class="conv-icon" style="animation:none">📅</span>
    <h2 class="step-title">Quando você prefere?</h2>
    <p class="step-text">Escolha a melhor data para o nosso encontro</p>
    <div class="divider"></div>
    <input class="conv-input" id="dateInput" type="date" />
    <button class="btn-send" onclick="sendAnswer()">Confirmar encontro 💌</button>
    <div id="finalMsg"></div>
  </div>

</div>

<script>
  const noBtn = document.getElementById('noBtn');

  // Botão fugindo pela tela inteira
  function escapeBtn(btn) {
    const maxX = window.innerWidth  - btn.offsetWidth  - 20;
    const maxY = window.innerHeight - btn.offsetHeight - 20;
    btn.style.position = 'fixed';
    btn.style.left = (10 + Math.random() * maxX) + 'px';
    btn.style.top  = (10 + Math.random() * maxY) + 'px';
    btn.style.zIndex = 10;
  }

  // Avança para o passo 2 (lugar)
  function goStep2() {
    document.getElementById('step1').classList.add('hidden');
    document.getElementById('step2').classList.remove('hidden');
    noBtn.style.display = 'none';
    spawnPetals();
  }

  // Avança para o passo 3 (data)
  function goStep3() {
    const place = document.getElementById('placeInput').value.trim();
    if (!place) {
      document.getElementById('placeInput').focus();
      return;
    }
    document.getElementById('step2').classList.add('hidden');
    document.getElementById('step3').classList.remove('hidden');
  }

  // Envia tudo via Formspree
  async function sendAnswer() {
    const place = document.getElementById('placeInput').value.trim();
    const dateRaw = document.getElementById('dateInput').value;

    if (!dateRaw) {
      document.getElementById('dateInput').focus();
      return;
    }

    // Formata a data para pt-BR
    const [y, m, d] = dateRaw.split('-');
    const dateFormatted = `${d}/${m}/${y}`;

    document.getElementById('finalMsg').innerHTML =
      `<div class="final-msg">
        Nosso encontro será em<br>
        <strong>${place}</strong> 🌹<br>
        no dia <strong>${dateFormatted}</strong><br>
        <span class="small">Mal posso esperar...</span>
      </div>`;
    spawnPetals();

    try {
      await fetch('https://formspree.io/f/mbdbzpzn', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json'
        },
        body: JSON.stringify({
          mensagem: 'Ela aceitou o convite!',
          lugar: place,
          data: dateFormatted
        })
      });
    } catch(e) {}
  }

  // Animação de pétalas
  function spawnPetals() {
    const emojis = ['🌸', '🌹', '🌷', '✿', '❀'];
    for (let i = 0; i < 24; i++) {
      setTimeout(() => {
        const p = document.createElement('div');
        p.className = 'petal';
        p.textContent = emojis[Math.floor(Math.random() * emojis.length)];
        p.style.left     = (Math.random() * 100) + 'vw';
        p.style.top      = '-30px';
        p.style.fontSize = (14 + Math.random() * 14) + 'px';
        p.style.animationDuration = (3 + Math.random() * 3) + 's';
        document.body.appendChild(p);
        setTimeout(() => p.remove(), 7000);
      }, i * 130);
    }
  }
</script>

</body>
</html>
